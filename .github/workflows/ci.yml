name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests (hits Jikan API)"
        default: "false"
        required: false
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC

jobs:
  test:
    name: Legacy unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  app:
    name: React app quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (ESLint, max-lines 400 / max-lines-per-function 25)
        run: npm run lint
      - name: Format check
        run: npm run format
      - name: Typecheck (strict)
        run: npm run typecheck
      - name: Unit + functional tests with coverage gate (>=80%)
        run: npm run test:coverage
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E tests (Playwright, mocked Jikan API)
        run: npm run test:e2e
      - name: Build
        run: npm run build

  integration:
    name: Integration tests
    # Run on schedule, or when manually triggered with input flag
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_integration == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Run integration tests
        run: npm run test:integration